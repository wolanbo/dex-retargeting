retargeting:
  type: DexPilot
  urdf_path: sharpa_hand/src/right_sharpa_ha4/right_sharpa_ha4_v2_1.urdf

  # Target refers to the retargeting target, which is the robot hand
  target_joint_names: [
    'right_thumb_CMC_FE',
    'right_thumb_CMC_AA', 
    'right_thumb_MCP_FE',
    'right_thumb_MCP_AA',
    'right_thumb_IP',
    'right_index_MCP_FE',
    'right_index_MCP_AA',
    'right_index_PIP',
    'right_index_DIP',
    'right_middle_MCP_FE',
    'right_middle_MCP_AA',
    'right_middle_PIP',
    'right_middle_DIP',
    'right_ring_MCP_FE',
    'right_ring_MCP_AA',
    'right_ring_PIP',
    'right_ring_DIP',
    'right_pinky_CMC',
    'right_pinky_MCP_FE',
    'right_pinky_MCP_AA',
    'right_pinky_PIP',
    'right_pinky_DIP'
  ]

  wrist_link_name: "right_hand_C_MC"

  finger_tip_link_names: [ "right_thumb_tip", "right_index_tip", "right_middle_tip", "right_ring_tip", "right_pinky_tip"]
  scaling_factor: 1.1

  # A smaller alpha means stronger filtering, i.e. more smooth but also larger latency
  low_pass_alpha: 0.2